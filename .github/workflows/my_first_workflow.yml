name: my first workflow
on:
  push:
    branches:
      - main
      jobs:
      build:
      runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Check Java
        run: java -version

      - name: Check Maven
        run: mvn -version

      - name: Build Project
        run: mvn clean install
        - name: Print Message
        run: echo "Workflow started!"

      - name: Show Current Directory
        run: pwd

      - name: List Files
        run: ls -la
