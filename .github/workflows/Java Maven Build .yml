run-name: Java Maven Build
on:
  push:
    branches:
      - main
      jobs:
         build:
            runs-on: ubuntu-latest
               steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify Maven
        run: mvn -version
          
